<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Berwin Art 2026 Dance Performance</title>

<!-- ============================================================

<script>
  window.GALLERY_CONFIG = {
    title:    "Berwin Art 2026 Dance Performance",
    subtitle: "Berwin Art · 2026",
    intro:    "A collection of moments from the performance — captured, edited, and kept.",
    footer:   "Photographed & edited by Berwin Liu."
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:        #f3ece2;   /* warm museum wall */
    --bg-soft:   #efe6d9;
    --ink:       #2b2622;   /* warm near-black */
    --muted:     #7a6f63;
    --line:      #d8ccbb;
    --gold:      #9c7b4d;
    --frame:     #fbf7f0;   /* mat / photo frame */
    --shadow:    rgba(60,45,30,.16);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Jost', system-ui, sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }

  /* subtle paper texture */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.5), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(160,130,90,.06), transparent 45%);
  }

  /* ---------- HERO ---------- */
  header.hero{
    position:relative; z-index:1;
    text-align:center;
    padding:14vh 24px 8vh;
    max-width:760px; margin:0 auto;
  }
  .hero .eyebrow{
    font-family:'Jost', sans-serif;
    text-transform:uppercase;
    letter-spacing:.42em;
    font-size:.72rem;
    color:var(--gold);
    margin:0 0 1.4rem;
    padding-left:.42em;
  }
  .hero h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:clamp(2.8rem, 8vw, 5.4rem);
    line-height:1.02;
    margin:0;
    letter-spacing:.5px;
  }
  .hero .rule{
    width:54px; height:1px; background:var(--gold);
    margin:2rem auto 1.6rem;
    opacity:.7;
  }
  .hero p.intro{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(1.1rem, 2.4vw, 1.45rem);
    color:var(--muted);
    max-width:30em; margin:0 auto;
  }

  /* ---------- GALLERY ---------- */
  main{ position:relative; z-index:1; padding:2vh 5vw 8vh; }
  #gallery{
    column-gap:22px;
    columns:1;
  }
  @media(min-width:560px){ #gallery{ columns:2; } }
  @media(min-width:920px){ #gallery{ columns:3; } }
  @media(min-width:1400px){ #gallery{ columns:4; } }

  figure.shot{
    break-inside:avoid;
    margin:0 0 22px;
    background:var(--frame);
    padding:12px 12px 12px;
    border:1px solid var(--line);
    box-shadow:0 8px 26px -12px var(--shadow);
    cursor:zoom-in;
    transition:transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s;
    opacity:0; transform:translateY(14px);
  }
  figure.shot.in{ opacity:1; transform:none; }
  figure.shot:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 40px -16px var(--shadow);
  }
  figure.shot .imgwrap{ overflow:hidden; }
  figure.shot img{
    display:block; width:100%; height:auto;
    background:var(--bg-soft);
    transition:transform .8s cubic-bezier(.2,.8,.2,1);
  }
  figure.shot:hover img{ transform:scale(1.05); }
  figure.shot figcaption{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.02rem;
    color:var(--muted);
    text-align:center;
    padding:.7rem .4rem .2rem;
  }

  /* ---------- EMPTY STATE ---------- */
  .empty{
    text-align:center; max-width:560px;
    margin:6vh auto; padding:3rem 2rem;
    border:1px dashed var(--line);
    background:var(--frame);
    font-family:'Cormorant Garamond', serif;
    color:var(--muted);
  }
  .empty h2{ font-weight:500; color:var(--ink); margin:0 0 1rem; font-size:1.6rem; }
  .empty code{
    font-family:ui-monospace, Menlo, monospace;
    font-size:.85rem; background:var(--bg);
    padding:.15em .45em; border-radius:4px; color:var(--ink);
  }
  .empty ol{ text-align:left; display:inline-block; margin:1rem auto 0; }

  /* ---------- FOOTER ---------- */
  footer{
    position:relative; z-index:1;
    text-align:center; padding:6vh 24px 8vh;
    border-top:1px solid var(--line);
    margin-top:4vh;
  }
  footer .mark{ width:40px; height:1px; background:var(--gold); margin:0 auto 1.4rem; opacity:.6; }
  footer p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic; color:var(--muted); margin:0;
    font-size:1.1rem;
  }

  /* ---------- LIGHTBOX ---------- */
  #lb{
    position:fixed; inset:0; z-index:50;
    background:rgba(28,23,18,.94);
    display:none; align-items:center; justify-content:center;
    opacity:0; transition:opacity .35s ease;
    backdrop-filter:blur(4px);
  }
  #lb.open{ display:flex; opacity:1; }
  #lb img{
    max-width:92vw; max-height:84vh;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.7);
    background:#000;
    user-select:none;
    transition:opacity .25s ease;
  }
  #lb img.kb{ animation:kbzoom 16s ease-out forwards; }
  @keyframes kbzoom{ from{ transform:scale(1); } to{ transform:scale(1.07); } }
  #lb .cap{
    position:absolute; bottom:4vh; left:0; right:0;
    text-align:center; color:#e9ddc9;
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:1.15rem; padding:0 1rem;
    text-shadow:0 1px 8px rgba(0,0,0,.5);
  }
  #lb .count{
    position:absolute; top:4vh; left:0; right:0;
    text-align:center; color:#bcae98;
    font-family:'Jost',sans-serif; letter-spacing:.3em;
    font-size:.72rem; text-transform:uppercase;
  }
  .lb-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:56px; height:56px; border:none; cursor:pointer;
    background:rgba(255,255,255,.06); color:#f0e6d4;
    font-size:1.6rem; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transition:background .25s; backdrop-filter:blur(2px);
  }
  .lb-btn:hover{ background:rgba(255,255,255,.16); }
  #lb-prev{ left:max(2vw,14px); }
  #lb-next{ right:max(2vw,14px); }
  #lb-close{
    top:3vh; right:max(2vw,14px); transform:none;
    width:48px; height:48px; font-size:1.3rem;
  }
  #lb-play{
    top:3vh; left:max(2vw,14px); transform:none;
    width:48px; height:48px; font-size:1rem;
  }
  @media(max-width:600px){
    .lb-btn{ width:46px; height:46px; }
    #lb img{ max-height:74vh; }
  }
</style>
</head>
<body>

  <header class="hero">
    <p class="eyebrow" id="c-sub"></p>
    <h1 id="c-title"></h1>
    <div class="rule"></div>
    <p class="intro" id="c-intro"></p>
  </header>

  <main>
    <section id="gallery"></section>
    <div class="empty" id="empty" hidden>
      <h2>The gallery is being prepared</h2>
      <p>Photographs from the evening are being edited and arranged.<br>Please check back here soon.</p>
    </div>
  </main>

  <footer>
    <div class="mark"></div>
    <p id="c-footer"></p>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lb" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="count" id="lb-count"></div>
    <button class="lb-btn" id="lb-play" aria-label="Play slideshow">&#9658;</button>
    <button class="lb-btn" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" alt="" />
    <button class="lb-btn" id="lb-next" aria-label="Next">&#8250;</button>
    <button class="lb-btn" id="lb-close" aria-label="Close">&times;</button>
    <div class="cap" id="lb-cap"></div>
  </div>

  <!-- generated list of photos -->
  <script src="photos.js"></script>

  <script>
  (function(){
    const cfg = window.GALLERY_CONFIG || {};
    document.getElementById('c-title').textContent  = cfg.title    || 'Gallery';
    document.getElementById('c-sub').textContent    = cfg.subtitle || '';
    document.getElementById('c-intro').textContent  = cfg.intro    || '';
    document.getElementById('c-footer').textContent = cfg.footer   || '';
    document.title = (cfg.title || 'Gallery') + ' — A Gallery';

    const photos = (window.PHOTOS || []);
    const gallery = document.getElementById('gallery');

    if(!photos.length){
      document.getElementById('empty').hidden = false;
      return;
    }

    // build grid
    photos.forEach((p, i) => {
      const fig = document.createElement('figure');
      fig.className = 'shot';
      fig.dataset.index = i;

      const wrap = document.createElement('div');
      wrap.className = 'imgwrap';
      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.title || ('Photo ' + (i+1));
      img.loading = 'lazy';
      img.decoding = 'async';
      wrap.appendChild(img);
      fig.appendChild(wrap);

      if(p.title){
        const cap = document.createElement('figcaption');
        cap.textContent = p.title;
        fig.appendChild(cap);
      }
      fig.addEventListener('click', () => openLB(i));
      gallery.appendChild(fig);
    });

    // fade-in on scroll
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }});
    }, {rootMargin:'0px 0px -8% 0px'});
    document.querySelectorAll('figure.shot').forEach(f=>io.observe(f));

    /* ---------- LIGHTBOX ---------- */
    const lb     = document.getElementById('lb');
    const lbImg  = document.getElementById('lb-img');
    const lbCap  = document.getElementById('lb-cap');
    const lbCount= document.getElementById('lb-count');
    let cur = 0;

    const playBtn = document.getElementById('lb-play');
    let timer = null;

    function show(i){
      cur = (i + photos.length) % photos.length;
      const p = photos[cur];
      lbImg.style.opacity = 0;
      const next = new Image();
      next.onload = () => {
        lbImg.src = p.src; lbImg.style.opacity = 1;
        lbImg.classList.remove('kb'); void lbImg.offsetWidth; lbImg.classList.add('kb'); // restart drift
      };
      next.src = p.src;
      lbCap.textContent = p.title || '';
      lbCount.textContent = (cur+1) + ' / ' + photos.length;
      // preload neighbours
      [cur+1, cur-1].forEach(n=>{ const q=photos[(n+photos.length)%photos.length]; if(q){ new Image().src=q.src; }});
    }
    function setPlay(on){
      if(on){ playBtn.innerHTML='&#10074;&#10074;'; playBtn.setAttribute('aria-label','Pause slideshow'); timer=setInterval(()=>show(cur+1), 4500); }
      else { playBtn.innerHTML='&#9658;'; playBtn.setAttribute('aria-label','Play slideshow'); clearInterval(timer); timer=null; }
    }
    function openLB(i){ show(i); lb.classList.add('open'); document.body.style.overflow='hidden'; }
    function closeLB(){ setPlay(false); lb.classList.remove('open'); document.body.style.overflow=''; }

    playBtn.addEventListener('click', e=>{ e.stopPropagation(); setPlay(!timer); });
    document.getElementById('lb-next').addEventListener('click', e=>{e.stopPropagation(); show(cur+1);});
    document.getElementById('lb-prev').addEventListener('click', e=>{e.stopPropagation(); show(cur-1);});
    document.getElementById('lb-close').addEventListener('click', closeLB);
    lb.addEventListener('click', e=>{ if(e.target===lb) closeLB(); });

    document.addEventListener('keydown', e=>{
      if(!lb.classList.contains('open')) return;
      if(e.key==='Escape') closeLB();
      else if(e.key==='ArrowRight') show(cur+1);
      else if(e.key==='ArrowLeft') show(cur-1);
      else if(e.key===' '){ e.preventDefault(); setPlay(!timer); }
    });

    // swipe
    let tx=0;
    lb.addEventListener('touchstart', e=>{ tx=e.changedTouches[0].clientX; }, {passive:true});
    lb.addEventListener('touchend', e=>{
      const dx=e.changedTouches[0].clientX - tx;
      if(Math.abs(dx)>50) show(dx<0 ? cur+1 : cur-1);
    }, {passive:true});
  })();
  </script>
</body>
</html>
